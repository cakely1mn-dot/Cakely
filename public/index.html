// ── Firebase DB ──────────────────────────────────
var DB = {
  // Bookings
  async loadBookings(){
    try {
      const snap = await getDocs(collection(db,"bookings"));
      return snap.docs.map(d => ({...d.data(), _docId: d.id}))
        .sort((a,b) => (b.createdAt||"").localeCompare(a.createdAt||""));
    } catch(e){ console.error("loadBookings error:", e); return []; }
  },
  async addBooking(b){
    try {
      const docRef = await addDoc(collection(db,"bookings"), b);
      return {...b, _docId: docRef.id};
    } catch(e){ console.error(e); return b; }
  },
  async updateBooking(docId, patch){
    try {
      if(!docId){ console.error("updateBooking: docId байхгүй байна"); return; }
      await updateDoc(doc(db,"bookings",docId), patch);
    } catch(e){ console.error("updateBooking error:", e); }
  },
  // Holidays
  async loadHolidays(){
    try {
      const snap = await getDocs(collection(db,"holidays"));
      return snap.docs.map(d => d.data().date).filter(Boolean).sort();
    } catch(e){ console.error(e); return []; }
  },
  async addHoliday(date){
    try {
      await addDoc(collection(db,"holidays"), {date});
    } catch(e){ console.error(e); }
  },
  async removeHoliday(date){
    try {
      const snap = await getDocs(collection(db,"holidays"));
      const target = snap.docs.find(d => d.data().date === date);
      if(target) await deleteDoc(doc(db,"holidays",target.id));
    } catch(e){ console.error("removeHoliday error:", e); }
  }
};

// ── Realtime listener ────────────────────────────
function startRealtimeSync(){
  onSnapshot(collection(db,"bookings"), snap => {
    S.bookings = snap.docs.map(d => ({...d.data(), _docId: d.id}))
      .sort((a,b) => (b.createdAt||"").localeCompare(a.createdAt||""));
    // Admin хуудсанд байвал зөвхөн table-г шинэчлэнэ
    if(S.page === "admin" && S.adminAuthed) {
      refreshAdminTable();
    } else {
      render();
    }
  }, err => console.error("bookings sync error:", err));
  onSnapshot(collection(db,"holidays"), snap => {
    S.holidays = snap.docs
      .map(d => d.data().date)
      .filter(Boolean)
      .sort();
    render();
  }, err => console.error("holidays sync error:", err));
}

// Admin table-г бүтэн render хийлгүйгээр шинэчлэх

  tableContainer.innerHTML = "";
  tableContainer.appendChild(buildAdminTable());
  // Stats шинэчлэх
  var statsContainer = document.getElementById("admin-stats-container");
  if(statsContainer){
    statsContainer.innerHTML = "";
    statsContainer.appendChild(buildAdminStats());
  }
}

function slotUsed(date, time){
  return S.bookings
    .filter(function(b){ return b.date===date && b.time===time && b.status!=="cancelled"; })
    .reduce(function(s,b){ return s+(b.qty||1); }, 0);
}

// ── DOM helpers ──────────────────────────────────
function el(tag, attrs, children){
  var e = document.createElement(tag);
  if(attrs){
    Object.keys(attrs).forEach(function(k){
      if(k==="style" && typeof attrs[k]==="object"){ Object.assign(e.style, attrs[k]); }
      else if(k==="className"){ e.className=attrs[k]; }
      else if(k==="html"){ e.innerHTML=attrs[k]; }
      else if(k.startsWith("on")){ e.addEventListener(k.slice(2).toLowerCase(), attrs[k]); }
      else{ e.setAttribute(k, attrs[k]); }
    });
  }
  if(children){
    if(!Array.isArray(children)) children=[children];
    children.forEach(function(c){
      if(c==null) return;
      if(c instanceof Node){ e.appendChild(c); }
      else{ e.appendChild(document.createTextNode(String(c))); }
    });
  }
  return e;
}

function showEmailModal(booking, emailText){

  modal.appendChild(bodyDiv);
  var btnRow = div({style:{display:"flex",gap:"8px"}});
  var copyBtn = btn({style:{flex:"1",background:"#1a1a1a",color:"#fff",border:"none",borderRadius:"10px",padding:"12px",fontWeight:"600",fontSize:"13px"}}, "📋 Текст хуулах");
  copyBtn.addEventListener("click",function(){
    navigator.clipboard.writeText(emailText).then(function(){
      copyBtn.textContent="✓ Хуулагдлаа!";
      setTimeout(function(){ copyBtn.textContent="📋 Текст хуулах"; },2000);
    });
  });
  var mailBtn = btn({style:{flex:"1",background:"#c084a8",color:"#fff",border:"none",borderRadius:"10px",padding:"12px",fontWeight:"600",fontSize:"13px"}}, "📨 "+booking.email+" руу мэйл");
  mailBtn.addEventListener("click",function(){
    navigator.clipboard.writeText(emailText).then(function(){
      mailBtn.textContent="✓ Хуулагдлаа! Мэйл app-д paste хийнэ үү.";
      mailBtn.style.background="#10b981";
      setTimeout(function(){
        mailBtn.textContent="📨 "+booking.email+" руу мэйл";
        mailBtn.style.background="#c084a8";
      },3000);
    });
  });
  btnRow.appendChild(copyBtn); btnRow.appendChild(mailBtn);
  modal.appendChild(btnRow);
  overlay.addEventListener("click",function(e){ if(e.target===overlay) overlay.remove(); });
  overlay.appendChild(modal);
  document.body.appendChild(overlay);
}

async function sendConfirmEmail(booking){
  var defaultText = "Сайн байна уу, "+booking.name+"!\n\nТаны захиалга баталгаажлаа.\n\nЗахиалгын дэлгэрэнгүй:\n- Багц: "+booking.packageName+"\n- Хүний тоо: "+booking.qty+"хүн\n- Огноо: "+booking.date+"\n- Цаг: "+booking.time+"\n- Нийт үнэ: "+fmt(booking.price)+"\n\nХаяг: "+ADDRESS+"\nУтас: "+PHONE+"\n\nБаярлалаа!\nCakely Studio";
  try{
    var res = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:500,
        messages:[{role:"user",content:"Write a warm confirmation email in Mongolian for Cakely Studio cake decoration booking. Customer: "+booking.name+", Package: "+booking.packageName+", People: "+booking.qty+", Date: "+booking.date+", Time: "+booking.time+", Total: "+fmt(booking.price)+". Address: "+ADDRESS+". Phone: "+PHONE+". Keep it short and friendly. Only write the email body."}]
      })
    });
    var data = await res.json();
    var text = (data.content && data.content[0] && data.content[0].text) || defaultText;
    showEmailModal(booking, text);
  } catch(e){
    showEmailModal(booking, defaultText);
  }
}

      var hList = div({style:{display:"flex",flexWrap:"wrap",gap:"8px"}});
      S.holidays.forEach(function(hd){
        var chip = div({style:{background:"#fff7ed",border:"1px solid #fed7aa",borderRadius:"9px",padding:"7px 12px",display:"flex",alignItems:"center",gap:"8px",fontSize:"13px"}});
        chip.appendChild(span({}, "📅 "+hd));
        var rb = btn({style:{background:"#fee2e2",color:"#ef4444",border:"none",borderRadius:"5px",padding:"1px 7px",fontSize:"12px",fontWeight:"700"}}, "✕");
        (function(date){
          rb.addEventListener("click", async function(){ await DB.removeHoliday(date); });
        })(hd);
        chip.appendChild(rb);
        hList.appendChild(chip);
      });
      hCard.appendChild(hList);
    }
    cgrid.appendChild(hCard);

    var sCard = div({style:{background:"#fff",borderRadius:"18px",padding:"24px",boxShadow:"0 1px 8px rgba(0,0,0,.05)"}});
    sCard.appendChild(h3({style:{fontSize:"15px",fontWeight:"700",marginBottom:"16px"}}, "📊 Өдрийн захиалгын байдал"));
    var sInp = inp({type:"date",value:S.schedDate});
    sInp.style.marginBottom="16px";
    sInp.addEventListener("change",function(e){ setState({schedDate:e.target.value}); });
    sCard.appendChild(sInp);
    if(S.holidays.indexOf(S.schedDate)>=0){
      sCard.appendChild(div({style:{background:"#fef3c7",border:"1px solid #fcd34d",borderRadius:"10px",padding:"12px 16px",fontSize:"13px",color:"#92400e"}}, "⚠️ Амралтын өдөр – захиалга авахгүй"));
    } else {
      var sgrid = div({style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"8px"}});
      SLOTS.forEach(function(t){
        var list = S.bookings.filter(function(b){ return b.date===S.schedDate && b.time===t && b.status!=="cancelled"; });
        var used = list.reduce(function(s,b){ return s+(b.qty||1); },0);
        var left = MAX_SLOT - used;
        var sc = div({style:{border:"1px solid #f0e6de",borderRadius:"12px",padding:"12px 10px",background:left===0?"#fff5f5":"#fff"}});
        sc.appendChild(p({style:{fontWeight:"700",fontSize:"15px",marginBottom:"3px"}}, t));
        sc.appendChild(p({style:{fontSize:"11px",fontWeight:"700",color:left===0?"#ef4444":left<=2?"#f59e0b":"#10b981"}}, left===0?"Дүүрсэн":used+"/"+MAX_SLOT));
        list.forEach(function(b){
          sc.appendChild(p({style:{fontSize:"10px",color:"#999",marginTop:"3px"}}, "• "+b.name+" ("+b.qty+"хүн)"));
        });
        sgrid.appendChild(sc);
      });
      sCard.appendChild(sgrid);
    }
    cgrid.appendChild(sCard);
    inner.appendChild(cgrid);
  }

  wrap.appendChild(inner);
  return wrap;
}

// ── Render ────────────────────────────────────────
function render(){
  var appEl = document.getElementById("app");
  appEl.innerHTML="";
  var page;
  if(S.page==="home") page=HomePage();
  else if(S.page==="book") page=BookPage();
  else if(S.page==="success") page=SuccessPage();
  else if(S.page==="admin") page=AdminPage();
  else page=HomePage();
  appEl.appendChild(page);
  window.scrollTo(0,0);
}

// ── Init ─────────────────────────────────────────
async function init(){
  // Load initial data
  const [bookings, holidays] = await Promise.all([DB.loadBookings(), DB.loadHolidays()]);
  S.bookings = bookings;
  S.holidays = holidays;

  // Hide loading, show app
  document.getElementById("loading-screen").style.display = "none";
  document.getElementById("app").style.display = "block";

  // Start realtime sync
  startRealtimeSync();

  render();
}

init();
</script>

</html>
