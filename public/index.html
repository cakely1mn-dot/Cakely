<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Cakely Studio ✨ Захиалгын систем</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  font-family: 'Quicksand', 'Inter', sans-serif;
  background: linear-gradient(135deg, #fff0f5 0%, #ffe4f0 50%, #ffd9e8 100%);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* Гар утсанд тогтсон, хөдөлгөөнгүй дэлгэц */
.app-wrapper {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  background: #ffffff;
  box-shadow: 0 0 40px rgba(255, 105, 180, 0.15);
  position: relative;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
}

/* Хөөрхөн скроллбар */
.app-wrapper::-webkit-scrollbar {
  width: 4px;
}
.app-wrapper::-webkit-scrollbar-track {
  background: #ffe4f0;
}
.app-wrapper::-webkit-scrollbar-thumb {
  background: #ffb6d9;
  border-radius: 10px;
}

/* Үндсэн контент */
.main-content {
  padding: 20px 20px 100px;
  min-height: 100vh;
}

/* Хөөрхөн картууд */
.pretty-card {
  background: white;
  border-radius: 32px;
  padding: 24px;
  box-shadow: 0 8px 28px rgba(255, 105, 180, 0.12);
  border: 1px solid rgba(255, 182, 217, 0.3);
  transition: all 0.3s ease;
}

/* Ягаан товчлуур */
.btn-pink {
  background: linear-gradient(135deg, #ff9acb, #ff80b5);
  color: white;
  border: none;
  padding: 14px 28px;
  border-radius: 60px;
  font-weight: 700;
  font-size: 16px;
  cursor: pointer;
  transition: all 0.3s;
  width: 100%;
  font-family: 'Quicksand', sans-serif;
  box-shadow: 0 4px 15px rgba(255, 128, 181, 0.3);
}

.btn-pink:active {
  transform: scale(0.97);
  box-shadow: 0 2px 8px rgba(255, 128, 181, 0.4);
}

.btn-outline-pink {
  background: transparent;
  border: 2px solid #ff9acb;
  color: #ff80b5;
  padding: 12px 24px;
  border-radius: 60px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-outline-pink:active {
  background: #fff0f7;
  transform: scale(0.98);
}

/* Time slots */
.time-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin: 20px 0;
}

.time-slot {
  background: #fff5f9;
  border: 2px solid #ffe0ed;
  border-radius: 50px;
  padding: 12px 8px;
  text-align: center;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  color: #b85c8a;
}

.time-slot.selected {
  background: linear-gradient(135deg, #ff9acb, #ff80b5);
  border-color: #ff80b5;
  color: white;
  transform: scale(0.98);
  box-shadow: 0 4px 12px rgba(255, 128, 181, 0.3);
}

.time-slot.disabled {
  opacity: 0.4;
  cursor: not-allowed;
  text-decoration: line-through;
  background: #f0e0e8;
}

/* Input fields */
.input-pink {
  width: 100%;
  padding: 14px 18px;
  border: 2px solid #ffe0ed;
  border-radius: 50px;
  font-size: 15px;
  font-family: 'Quicksand', sans-serif;
  background: #fffafc;
  transition: all 0.2s;
}

.input-pink:focus {
  outline: none;
  border-color: #ff9acb;
  box-shadow: 0 0 0 3px rgba(255, 154, 203, 0.1);
}

/* Stepper */
.stepper {
  display: flex;
  align-items: center;
  margin-bottom: 32px;
  background: #fff5f9;
  padding: 12px 20px;
  border-radius: 80px;
}

.step-item {
  flex: 1;
  text-align: center;
  position: relative;
}

.step-circle {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: #ffe0ed;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  color: #b85c8a;
  margin-bottom: 6px;
  transition: all 0.3s;
}

.step-circle.active {
  background: linear-gradient(135deg, #ff9acb, #ff80b5);
  color: white;
  box-shadow: 0 2px 12px rgba(255, 128, 181, 0.4);
}

.step-circle.completed {
  background: #ffb6d9;
  color: white;
}

.step-label {
  font-size: 11px;
  font-weight: 600;
  color: #b87a9c;
}

.step-label.active {
  color: #ff80b5;
}

/* Quantity selector */
.qty-selector {
  background: #fff5f9;
  border-radius: 60px;
  padding: 12px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.qty-btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: white;
  border: 2px solid #ffe0ed;
  font-size: 24px;
  font-weight: bold;
  cursor: pointer;
  color: #ff80b5;
  transition: all 0.2s;
}

.qty-btn:active {
  transform: scale(0.92);
  background: #fff0f7;
}

/* Admin panel */
.admin-card {
  background: white;
  border-radius: 28px;
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
}

/* Modal */
.modal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0, 0, 0, 0.5);
  backdrop-filter: blur(4px);
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

/* Navigation */
.nav-pink {
  background: white;
  padding: 12px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid #ffe0ed;
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(255, 255, 255, 0.98);
  backdrop-filter: blur(10px);
}

/* Status badges */
.status-badge {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 40px;
  font-size: 11px;
  font-weight: 600;
}

.status-pending {
  background: #fff0e0;
  color: #ff9a3c;
}

.status-confirmed {
  background: #e6f9ed;
  color: #2ecc71;
}

.status-cancelled {
  background: #ffe6e6;
  color: #e74c3c;
}

/* Admin table responsive */
.admin-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

.admin-table th,
.admin-table td {
  padding: 10px 8px;
  text-align: left;
  border-bottom: 1px solid #ffe0ed;
}

/* Админ хэсгийн алдаа зассан */
.admin-container {
  min-height: 100vh;
  background: #fef5f9;
}
</style>
</head>
<body>
<div id="app" class="app-wrapper"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getFirestore, collection, addDoc, getDocs, query, where, updateDoc, doc, orderBy
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { 
  getAuth, signInWithEmailAndPassword, signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDVXshgnrA-Q8C8Nm-CPdZ4LWsSGVOSgAs",
  authDomain: "cakely-30e38.firebaseapp.com",
  projectId: "cakely-30e38",
  storageBucket: "cakely-30e38.firebasestorage.app",
  messagingSenderId: "205358268388",
  appId: "1:205358268388:web:d43f871258c592894891f1"
};

const firebaseApp = initializeApp(firebaseConfig);
const db = getFirestore(firebaseApp);
const auth = getAuth(firebaseApp);

const PHONE = "90301779";
const ADDRESS = "11-р хороолол, Diamond Entertainment Lounge";
const BANK = "Хаан банк";
const ACCOUNT = "290005005070318300";
const ADMIN_EMAIL = "cakely1.mn@gmail.com";
const ADMIN_PASS = "Cakely@2026";
const SLOTS = ["10:00", "12:00", "14:00", "16:00", "18:00", "20:00"];
const MAX_SLOT = 6;

const PKG = {
  id: "solo",
  name: "🎀 Нэг хүний багц",
  price: 45000,
  emoji: "🍰✨",
  items: ["🍰 Бялууны кекс 1 ширхэг", "🎨 Крем + чимэглэл", "🥤 Уух зүйл 1 ширхэг", "📖 Заавар зөвлөгөө"]
};

function formatPrice(n) { return (n || 0).toLocaleString() + "₮"; }
function getToday() { return new Date().toISOString().slice(0, 10); }
function generateId() { return Date.now().toString(36).toUpperCase() + Math.random().toString(36).slice(2, 6).toUpperCase(); }

let state = {
  page: "home",
  bookings: [],
  lastBooking: null,
  step: 1,
  date: getToday(),
  time: "",
  qty: 1,
  form: { name: "", phone: "", email: "" },
  errors: {},
  adminAuthed: false,
  adminTab: "bookings",
  adminFilter: "all",
  loading: false
};

async function loadBookings() {
  try {
    const snapshot = await getDocs(collection(db, "bookings"));
    const bookings = [];
    snapshot.forEach(doc => bookings.push({ id: doc.id, ...doc.data() }));
    state.bookings = bookings;
  } catch (e) { console.error(e); }
  render();
}

async function checkSlotAvailable(date, time, qty) {
  try {
    const q = query(collection(db, "bookings"), where("date", "==", date), where("time", "==", time));
    const snap = await getDocs(q);
    let used = 0;
    snap.forEach(d => { if (d.data().status !== "cancelled") used += (d.data().qty || 1); });
    return (used + qty) <= MAX_SLOT;
  } catch (e) { return false; }
}

async function createBooking(data) {
  try {
    await addDoc(collection(db, "bookings"), { ...data, createdAt: new Date().toISOString(), status: "pending" });
    return true;
  } catch (e) { return false; }
}

async function updateBookingStatus(id, status) {
  try {
    await updateDoc(doc(db, "bookings", id), { status });
    return true;
  } catch (e) { return false; }
}

async function adminLogin(email, pass) {
  try {
    await signInWithEmailAndPassword(auth, email, pass);
    state.adminAuthed = true;
    localStorage.setItem("ck:auth", "1");
    render();
    return true;
  } catch (e) { return false; }
}

function adminLogout() {
  signOut(auth);
  state.adminAuthed = false;
  localStorage.removeItem("ck:auth");
  state.page = "home";
  render();
}

function render() {
  const appDiv = document.getElementById("app");
  appDiv.innerHTML = "";
  
  if (state.page === "home") renderHome(appDiv);
  else if (state.page === "book") renderBooking(appDiv);
  else if (state.page === "success") renderSuccess(appDiv);
  else if (state.page === "admin") renderAdmin(appDiv);
  else renderHome(appDiv);
}

function renderHome(container) {
  container.innerHTML = `
    <div class="main-content">
      <div style="text-align: center; margin-bottom: 32px;">
        <div style="font-size: 56px; margin-bottom: 8px;">🍰✨</div>
        <h1 style="font-size: 32px; font-weight: 700; background: linear-gradient(135deg, #ff80b5, #ff9acb); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Cakely Studio</h1>
        <p style="color: #b85c8a; margin-top: 8px;">Гар хийцийн бялууны студио</p>
      </div>
      
      <div class="pretty-card" style="margin-bottom: 20px; text-align: center;">
        <div style="font-size: 48px; margin-bottom: 12px;">${PKG.emoji}</div>
        <h2 style="font-size: 24px; margin-bottom: 8px;">${PKG.name}</h2>
        <p style="font-size: 28px; font-weight: 700; color: #ff80b5; margin: 12px 0;">${formatPrice(PKG.price)} / хүн</p>
        <ul style="list-style: none; text-align: left; margin: 20px 0;">
          ${PKG.items.map(i => `<li style="margin: 8px 0; display: flex; align-items: center; gap: 8px;"><span>🌸</span>${i}</li>`).join("")}
        </ul>
        <button class="btn-pink" id="bookNowBtn">📅 Захиалах</button>
      </div>
      
      <div class="pretty-card" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; text-align: center;">
        <div><span style="font-size: 28px;">📍</span><p style="font-size: 12px;">${ADDRESS.split(",")[0]}</p></div>
        <div><span style="font-size: 28px;">📞</span><p style="font-size: 12px;">${PHONE}</p></div>
        <div><span style="font-size: 28px;">⏰</span><p style="font-size: 12px;">10:00-20:00</p></div>
        <div><span style="font-size: 28px;">💳</span><p style="font-size: 12px;">${BANK}</p></div>
      </div>
      
      <button id="adminNavBtn" style="background: none; border: 1px solid #ffd0e4; border-radius: 60px; padding: 10px; width: 100%; margin-top: 20px; color: #ff80b5; font-weight: 600;">🔐 Админ хэсэг</button>
    </div>
  `;
  
  document.getElementById("bookNowBtn")?.addEventListener("click", () => { state.page = "book"; state.step = 1; state.time = ""; render(); });
  document.getElementById("adminNavBtn")?.addEventListener("click", () => { state.page = "admin"; render(); });
}

function renderBooking(container) {
  container.innerHTML = `<div class="main-content"></div>`;
  const content = container.querySelector(".main-content");
  
  const backBtn = `<button id="backHomeBtn" style="background: none; border: none; font-size: 24px; margin-bottom: 16px; color: #ff80b5;">←</button>`;
  content.innerHTML = backBtn;
  
  const stepperHtml = `
    <div class="stepper">
      ${[1, 2, 3].map(i => `
        <div class="step-item">
          <div class="step-circle ${state.step === i ? 'active' : state.step > i ? 'completed' : ''}">${state.step > i ? '✓' : i}</div>
          <div class="step-label ${state.step === i ? 'active' : ''}">${i === 1 ? 'Багц' : i === 2 ? 'Цаг' : 'Мэдээлэл'}</div>
        </div>
      `).join("")}
    </div>
  `;
  content.innerHTML += stepperHtml;
  
  if (state.step === 1) {
    content.innerHTML += `
      <div class="pretty-card" style="cursor: pointer;" id="selectPackageCard">
        <div style="display: flex; align-items: center; gap: 16px;">
          <span style="font-size: 48px;">${PKG.emoji}</span>
          <div style="flex: 1;">
            <h3 style="font-size: 20px;">${PKG.name}</h3>
            <p style="color: #ff80b5; font-weight: 700;">${formatPrice(PKG.price)} / хүн</p>
          </div>
          <span style="font-size: 24px;">→</span>
        </div>
      </div>
    `;
    document.getElementById("selectPackageCard")?.addEventListener("click", () => { state.step = 2; render(); });
  }
  else if (state.step === 2) {
    content.innerHTML += `
      <div class="pretty-card">
        <label style="font-weight: 600; margin-bottom: 8px; display: block;">📅 Өдөр сонгох</label>
        <input type="date" id="datePicker" value="${state.date}" min="${getToday()}" class="input-pink" style="margin-bottom: 20px;">
        <label style="font-weight: 600; margin-bottom: 12px; display: block;">⏰ Цаг сонгох</label>
        <div id="timeSlots" class="time-grid"></div>
        <button id="nextStepBtn" class="btn-pink" disabled>Үргэлжлүүлэх →</button>
      </div>
    `;
    
    const updateSlots = async () => {
      const date = document.getElementById("datePicker").value;
      const slotsDiv = document.getElementById("timeSlots");
      slotsDiv.innerHTML = "";
      for (const slot of SLOTS) {
        const available = await checkSlotAvailable(date, slot, 1);
        const slotDiv = document.createElement("div");
        slotDiv.className = `time-slot ${state.time === slot ? 'selected' : ''} ${!available ? 'disabled' : ''}`;
        slotDiv.textContent = slot;
        if (available) slotDiv.addEventListener("click", () => { state.time = slot; updateSlots(); document.getElementById("nextStepBtn").disabled = false; });
        slotsDiv.appendChild(slotDiv);
      }
    };
    
    document.getElementById("datePicker").addEventListener("change", (e) => { state.date = e.target.value; state.time = ""; updateSlots(); });
    updateSlots();
    document.getElementById("nextStepBtn").addEventListener("click", () => { if (state.time) { state.step = 3; render(); } });
  }
  else if (state.step === 3) {
    content.innerHTML += `
      <div class="pretty-card">
        <div class="qty-selector">
          <span style="font-weight: 600;">👥 Хүний тоо</span>
          <div style="display: flex; gap: 12px; align-items: center;">
            <button id="qtyMinus" class="qty-btn">-</button>
            <span id="qtyVal" style="font-size: 20px; font-weight: 700; min-width: 40px; text-align: center;">${state.qty}</span>
            <button id="qtyPlus" class="qty-btn">+</button>
          </div>
        </div>
        
        <input type="text" id="nameInput" placeholder="🌸 Нэр" class="input-pink" style="margin-bottom: 12px;" value="${state.form.name}">
        <input type="tel" id="phoneInput" placeholder="📞 Утас (8 орон)" class="input-pink" style="margin-bottom: 12px;" value="${state.form.phone}">
        <input type="email" id="emailInput" placeholder="✉️ И-мэйл" class="input-pink" style="margin-bottom: 20px;" value="${state.form.email}">
        
        <div style="background: #fff5f9; border-radius: 24px; padding: 16px; margin-bottom: 20px;">
          <p style="font-weight: 700; margin-bottom: 8px;">📋 Захиалгын мэдээлэл</p>
          <div style="display: flex; justify-content: space-between;"><span>${PKG.name}</span><span>${formatPrice(PKG.price * state.qty)}</span></div>
          <div style="display: flex; justify-content: space-between;"><span>Хүний тоо:</span><span>${state.qty} хүн</span></div>
          <div style="display: flex; justify-content: space-between;"><span>Өдөр:</span><span>${state.date}</span></div>
          <div style="display: flex; justify-content: space-between;"><span>Цаг:</span><span>${state.time}</span></div>
        </div>
        
        <button id="submitBookingBtn" class="btn-pink">✨ Захиалга илгээх ✨</button>
      </div>
    `;
    
    const updateQtyDisplay = () => {
      document.getElementById("qtyVal").textContent = state.qty;
    };
    
    document.getElementById("qtyMinus").addEventListener("click", () => { if (state.qty > 1) { state.qty--; updateQtyDisplay(); } });
    document.getElementById("qtyPlus").addEventListener("click", async () => { 
      const max = MAX_SLOT - (await getCurrentUsed()); 
      if (state.qty < max) state.qty++; updateQtyDisplay(); 
    });
    
    async function getCurrentUsed() {
      const q = query(collection(db, "bookings"), where("date", "==", state.date), where("time", "==", state.time));
      const snap = await getDocs(q);
      let used = 0;
      snap.forEach(d => { if (d.data().status !== "cancelled") used += (d.data().qty || 1); });
      return used;
    }
    
    document.getElementById("submitBookingBtn").addEventListener("click", async () => {
      const name = document.getElementById("nameInput").value.trim();
      const phone = document.getElementById("phoneInput").value.trim();
      const email = document.getElementById("emailInput").value.trim();
      if (!name || !phone || !email) { alert("Бүх талбарыг бөглөнө үү 💕"); return; }
      if (!/^\d{8}$/.test(phone)) { alert("Утасны дугаар 8 оронтой байх ёстой 📞"); return; }
      if (!email.includes("@")) { alert("Зөв и-мэйл хаяг оруулна уу ✉️"); return; }
      
      const available = await checkSlotAvailable(state.date, state.time, state.qty);
      if (!available) { alert("Сонгосон цаг дүүрсэн байна 😢"); return; }
      
      const bookingData = {
        id: generateId(), name, phone, email, date: state.date, time: state.time, qty: state.qty,
        packageName: PKG.name, price: PKG.price * state.qty, status: "pending", createdAt: new Date().toISOString()
      };
      
      const success = await createBooking(bookingData);
      if (success) {
        state.lastBooking = bookingData;
        state.page = "success";
        state.step = 1;
        state.qty = 1;
        state.form = { name: "", phone: "", email: "" };
        state.time = "";
        loadBookings();
      } else { alert("Алдаа гарлаа. Дахин оролдоно уу 💔"); }
    });
  }
  
  document.getElementById("backHomeBtn")?.addEventListener("click", () => { state.page = "home"; render(); });
}

function renderSuccess(container) {
  const b = state.lastBooking;
  if (!b) { state.page = "home"; render(); return; }
  
  container.innerHTML = `
    <div class="main-content" style="display: flex; align-items: center; justify-content: center; min-height: 80vh;">
      <div class="pretty-card" style="text-align: center; width: 100%;">
        <div style="font-size: 64px;">🎉✨🍰</div>
        <h2 style="font-size: 28px; margin: 16px 0;">Захиалга амжилттай!</h2>
        <p style="color: #b85c8a;">Захиалгын дугаар: #${b.id.slice(0,8)}</p>
        <div style="background: #fff5f9; border-radius: 24px; padding: 16px; margin: 20px 0; text-align: left;">
          <p><strong>📦 ${b.packageName}</strong></p>
          <p>👥 ${b.qty} хүн &nbsp; 📅 ${b.date} &nbsp; ⏰ ${b.time}</p>
          <p>💰 ${formatPrice(b.price)}</p>
        </div>
        <div style="background: #fff0f5; border-radius: 20px; padding: 12px; margin-bottom: 20px;">
          <p>💳 ${BANK} · ${ACCOUNT}</p>
          <p>Гүйлгээний утга: <strong>${b.phone}</strong></p>
        </div>
        <button class="btn-pink" id="backHomeSuccess">🏠 Нүүр хуудас</button>
      </div>
    </div>
  `;
  document.getElementById("backHomeSuccess")?.addEventListener("click", () => { state.page = "home"; render(); });
}

function renderAdmin(container) {
  // Админ хэсгийн white screen асуудлыг зассан
  if (!state.adminAuthed) {
    container.innerHTML = `
      <div class="main-content" style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">
        <div class="pretty-card" style="width: 100%; text-align: center;">
          <div style="font-size: 48px;">🔐✨</div>
          <h2 style="margin: 16px 0;">Админ нэвтрэх</h2>
          <input type="email" id="adminEmail" placeholder="И-мэйл" class="input-pink" style="margin-bottom: 12px;">
          <input type="password" id="adminPassword" placeholder="Нууц үг" class="input-pink" style="margin-bottom: 20px;">
          <button id="adminLoginBtn" class="btn-pink">Нэвтрэх</button>
          <button id="adminBackHome" style="background: none; border: none; color: #ff80b5; margin-top: 16px;">← Нүүр рүү буцах</button>
          <div id="loginError" style="color: #e74c3c; font-size: 12px; margin-top: 12px;"></div>
        </div>
      </div>
    `;
    
    document.getElementById("adminLoginBtn")?.addEventListener("click", async () => {
      const email = document.getElementById("adminEmail").value;
      const pass = document.getElementById("adminPassword").value;
      const success = await adminLogin(email, pass);
      if (!success) document.getElementById("loginError").textContent = "❌ И-мэйл эсвэл нууц үг буруу";
    });
    document.getElementById("adminBackHome")?.addEventListener("click", () => { state.page = "home"; render(); });
    return;
  }
  
  // Admin panel (white screen зассан)
  container.innerHTML = `<div class="admin-container" style="min-height: 100vh; padding: 20px;"></div>`;
  const adminDiv = container.querySelector(".admin-container");
  
  adminDiv.innerHTML = `
    <div style="background: white; border-radius: 28px; padding: 16px 20px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 12px rgba(0,0,0,0.05);">
      <div><span style="font-size: 24px;">🍰</span><span style="font-weight: 700; margin-left: 8px;">Cakely Admin</span></div>
      <button id="adminLogoutBtn" style="background: #ffe0ed; border: none; padding: 8px 16px; border-radius: 40px; font-weight: 600; color: #ff80b5;">Гарах</button>
    </div>
    
    <div style="display: flex; gap: 8px; margin-bottom: 20px;">
      <button id="tabBookings" class="${state.adminTab === 'bookings' ? 'btn-pink' : 'btn-outline-pink'}" style="flex: 1; padding: 10px;">📋 Захиалгууд</button>
      <button id="tabCalendar" class="${state.adminTab === 'calendar' ? 'btn-pink' : 'btn-outline-pink'}" style="flex: 1; padding: 10px;">📅 Хуваарь</button>
    </div>
    
    <div id="adminContent"></div>
  `;
  
  const adminContent = adminDiv.querySelector("#adminContent");
  
  if (state.adminTab === "bookings") {
    const pending = state.bookings.filter(b => b.status === "pending").length;
    const confirmed = state.bookings.filter(b => b.status === "confirmed").length;
    adminContent.innerHTML = `
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px;">
        <div class="admin-card" style="text-align: center;"><div style="font-size: 28px; font-weight: 700; color: #ff9a3c;">${pending}</div><div>Хүлээгдэж буй</div></div>
        <div class="admin-card" style="text-align: center;"><div style="font-size: 28px; font-weight: 700; color: #2ecc71;">${confirmed}</div><div>Баталгаажсан</div></div>
      </div>
      <div style="display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;">
        ${["all","pending","confirmed","cancelled"].map(f => `<button class="filter-btn" data-filter="${f}" style="background:${state.adminFilter===f?'#ff9acb':'white'};border:1px solid #ffe0ed;border-radius:40px;padding:6px 16px;">${f==='all'?'Бүгд':f==='pending'?'Хүлээгэж буй':f==='confirmed'?'Баталгаажсан':'Цуцлагдсан'}</button>`).join("")}
      </div>
      <div class="admin-card" style="overflow-x: auto;">
        <table class="admin-table">
          <thead><tr><th>Нэр</th><th>Огноо</th><th>Цаг</th><th>Тоо</th><th>Төлөв</th><th></th></tr></thead>
          <tbody id="bookingsTableBody"></tbody>
        </table>
      </div>
    `;
    
    const filtered = state.adminFilter === "all" ? state.bookings : state.bookings.filter(b => b.status === state.adminFilter);
    const tbody = adminContent.querySelector("#bookingsTableBody");
    tbody.innerHTML = filtered.slice().reverse().map(b => `
      <tr>
        <td><strong>${b.name}</strong><br><span style="font-size: 10px; color: #888;">${b.email}</span></td>
        <td>${b.date}</td><td>${b.time}</td><td>${b.qty || 1}</td>
        <td><span class="status-badge status-${b.status}">${b.status === 'pending' ? 'Хүлээгэж буй' : b.status === 'confirmed' ? 'Баталгаажсан' : 'Цуцлагдсан'}</span></td>
        <td>${b.status === 'pending' ? `<button class="confirm-btn" data-id="${b.id}" style="background:#ff9acb;border:none;border-radius:40px;padding:6px 12px;color:white;">✓ Баталгаажуулах</button>` : ''}</td>
       </tr>
    `).join("");
    
    document.querySelectorAll(".confirm-btn").forEach(btn => {
      btn.addEventListener("click", async (e) => { await updateBookingStatus(btn.dataset.id, "confirmed"); loadBookings(); });
    });
    document.querySelectorAll(".filter-btn").forEach(btn => {
      btn.addEventListener("click", () => { state.adminFilter = btn.dataset.filter; render(); });
    });
  }
  else if (state.adminTab === "calendar") {
    adminContent.innerHTML = `
      <div class="admin-card">
        <label style="font-weight: 600;">Өдөр сонгох</label>
        <input type="date" id="scheduleDate" value="${state.schedDate}" class="input-pink" style="margin: 12px 0;">
        <div id="dailySlots"></div>
      </div>
    `;
    const updateDaily = () => {
      const date = document.getElementById("scheduleDate").value;
      const slotsDiv = document.getElementById("dailySlots");
      slotsDiv.innerHTML = `<div class="time-grid">${SLOTS.map(slot => {
        const bookings = state.bookings.filter(b => b.date === date && b.time === slot && b.status !== "cancelled");
        const used = bookings.reduce((s,b) => s + (b.qty||1), 0);
        return `<div style="background:#fff5f9;border-radius:20px;padding:12px;text-align:center;"><strong>${slot}</strong><br>${used}/${MAX_SLOT}<br>${bookings.map(b => `<span style="font-size:10px;">${b.name}</span>`).join(", ")}</div>`;
      }).join("")}</div>`;
    };
    document.getElementById("scheduleDate").addEventListener("change", updateDaily);
    updateDaily();
  }
  
  document.getElementById("tabBookings")?.addEventListener("click", () => { state.adminTab = "bookings"; render(); });
  document.getElementById("tabCalendar")?.addEventListener("click", () => { state.adminTab = "calendar"; render(); });
  document.getElementById("adminLogoutBtn")?.addEventListener("click", () => { adminLogout(); });
}

// Firebase Auth state
auth.onAuthStateChanged((user) => {
  if (user && user.email === ADMIN_EMAIL) {
    state.adminAuthed = true;
    localStorage.setItem("ck:auth", "1");
  }
  loadBookings();
});

loadBookings();
</script>
</body>
</html>
