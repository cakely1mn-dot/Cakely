<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', sans-serif;
  background: #fffaf7;
  color: #2c241a;
  line-height: 1.5;
}

h1, h2, h3, .serif {
  font-family: 'Playfair Display', serif;
}

.container {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 24px;
}

/* Buttons */
.btn-primary {
  background: #c27e4a;
  color: white;
  border: none;
  padding: 12px 28px;
  border-radius: 40px;
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s ease;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.btn-primary:hover {
  background: #a56334;
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(194, 126, 74, 0.2);
}

.btn-outline {
  background: transparent;
  border: 2px solid #c27e4a;
  color: #c27e4a;
  padding: 10px 24px;
  border-radius: 40px;
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-outline:hover {
  background: #c27e4a;
  color: white;
}

/* Cards */
.card {
  background: white;
  border-radius: 24px;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
  padding: 28px;
  transition: all 0.3s;
}

/* Form elements */
input, select, textarea {
  width: 100%;
  padding: 12px 16px;
  border: 1.5px solid #e8ddd5;
  border-radius: 12px;
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  transition: all 0.2s;
  background: white;
}

input:focus, select:focus {
  outline: none;
  border-color: #c27e4a;
  box-shadow: 0 0 0 3px rgba(194, 126, 74, 0.1);
}

/* Time slots */
.time-slots {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
  gap: 12px;
  margin: 20px 0;
}

.time-slot {
  background: #fef7f0;
  border: 2px solid #f0e2d6;
  border-radius: 60px;
  padding: 12px 8px;
  text-align: center;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.time-slot.selected {
  background: #c27e4a;
  border-color: #c27e4a;
  color: white;
}

.time-slot.disabled {
  opacity: 0.4;
  cursor: not-allowed;
  text-decoration: line-through;
}

/* Admin table */
.admin-table {
  width: 100%;
  border-collapse: collapse;
  overflow-x: auto;
  display: block;
}

.admin-table th,
.admin-table td {
  padding: 12px;
  text-align: left;
  border-bottom: 1px solid #f0e6de;
}

.admin-table th {
  background: #faf7f4;
  font-weight: 600;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: #8b735a;
}

/* Status badges */
.status-badge {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
}

.status-pending {
  background: #fef3c7;
  color: #d97706;
}

.status-confirmed {
  background: #d1fae5;
  color: #059669;
}

.status-cancelled {
  background: #fee2e2;
  color: #dc2626;
}

/* Modal */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0, 0, 0, 0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  padding: 20px;
}

.modal-content {
  background: white;
  border-radius: 24px;
  max-width: 500px;
  width: 100%;
  max-height: 80vh;
  overflow-y: auto;
  padding: 28px;
}

/* Loading */
.loading {
  text-align: center;
  padding: 40px;
  color: #c27e4a;
}

/* Responsive */
@media (max-width: 768px) {
  .container {
    padding: 0 16px;
  }
  
  .time-slots {
    grid-template-columns: repeat(2, 1fr);
  }
}
</style>
</head>

// ========== HELPER FUNCTIONS ==========
function formatPrice(n) {
  return (n || 0).toLocaleString() + "₮";
}

function generateId() {
  return Date.now().toString(36).toUpperCase() + Math.random().toString(36).slice(2, 6).toUpperCase();

// ========== FIREBASE OPERATIONS ==========
async function loadBookings() {
  state.loading = true;
  render();
  try {
    const querySnapshot = await getDocs(collection(db, "bookings"));
    const bookings = [];
    querySnapshot.forEach(doc => {
      bookings.push({ id: doc.id, ...doc.data() });
    });
    state.bookings = bookings;
  } catch (error) {
    console.error("Error loading bookings:", error);
  }
  state.loading = false;
  render();
}

async function checkSlotAvailable(date, time, qty) {
  try {
    const q = query(
      collection(db, "bookings"),
      where("date", "==", date),
      where("time", "==", time)
    );
    const snapshot = await getDocs(q);
    let used = 0;
    snapshot.forEach(doc => {
      const booking = doc.data();
      if (booking.status !== "cancelled") {
        used += booking.qty || 1;
      }
    });
    return (used + qty) <= MAX_SLOT;
  } catch (error) {
    console.error("Error checking slot:", error);
    return false;
  }
}

async function createBooking(bookingData) {
  try {
    const docRef = await addDoc(collection(db, "bookings"), {
      ...bookingData,
      createdAt: new Date().toISOString(),
      status: "pending"
    });
    return { success: true, id: docRef.id };
  } catch (error) {
    console.error("Error creating booking:", error);
    return { success: false, error: error.message };
  }
}

async function updateBookingStatus(bookingId, status) {
  try {
    await updateDoc(doc(db, "bookings", bookingId), { status });
    return true;
  } catch (error) {
    console.error("Error updating booking:", error);
    return false;
  }
}

      backBtn?.addEventListener("click", () => { state.step = 1; render(); });
      
      async function updateTimeSlots() {
        const selectedDate = datePicker.value;

          const available = await checkSlotAvailable(selectedDate, slot, 1);
          const slotDiv = document.createElement("div");

            slotDiv.addEventListener("click", () => {
              state.time = slot;
              updateTimeSlots();
              nextBtn.disabled = false;
            });

          timeSlotsDiv.appendChild(slotDiv);

      datePicker.addEventListener("change", (e) => {
        state.date = e.target.value;
        state.time = "";
        nextBtn.disabled = true;
        updateTimeSlots();
      });
      
      await updateTimeSlots();

        </div>
      `;
      
      // Form fields
      const formDiv = document.getElementById("formFields");
      formDiv.innerHTML = `
        <div style="margin-bottom:16px;"><label>Нэр</label><input type="text" id="nameInput" placeholder="Таны нэр" value="${state.form.name}"></div>

        <div style="margin-bottom:16px;"><label>И-мэйл</label><input type="email" id="emailInput" placeholder="email@example.com" value="${state.form.email}"></div>
      `;
      
      // Summary
      const summaryDiv = document.getElementById("summary");
      summaryDiv.innerHTML = `
        <p style="font-weight:700;margin-bottom:12px;">📋 ЗАХИАЛГЫН ДЭЛГЭРЭНГҮЙ</p>
        <div style="display:flex;justify-content:space-between;margin-bottom:6px;"><span style="color:#888;">Багц</span><span>${PKG.name}</span></div>
        <div style="display:flex;justify-content:space-between;margin-bottom:6px;"><span style="color:#888;">Хүний тоо</span><span>${state.qty} хүн</span></div>
        <div style="display:flex;justify-content:space-between;margin-bottom:6px;"><span style="color:#888;">Өдөр</span><span>${state.date}</span></div>
        <div style="display:flex;justify-content:space-between;margin-bottom:6px;"><span style="color:#888;">Цаг</span><span>${state.time}</span></div>
        <div style="display:flex;justify-content:space-between;margin-top:12px;padding-top:12px;border-top:1px solid #e9d5ff;"><span style="font-weight:700;">Нийт үнэ</span><span style="font-weight:700;color:#c27e4a;">${formatPrice(PKG.price * state.qty)}</span></div>
      `;
      
      const qtyMinus = document.getElementById("qtyMinus");
      const qtyPlus = document.getElementById("qtyPlus");
      const qtyValue = document.getElementById("qtyValue");
      
      qtyMinus.addEventListener("click", () => {
        if (state.qty > 1) {
          state.qty--;
          qtyValue.textContent = state.qty;
          summaryDiv.innerHTML = `
            <p style="font-weight:700;margin-bottom:12px;">📋 ЗАХИАЛГЫН ДЭЛГЭРЭНГҮЙ</p>
            <div style="display:flex;justify-content:space-between;margin-bottom:6px;"><span style="color:#888;">Багц</span><span>${PKG.name}</span></div>
            <div style="display:flex;justify-content:space-between;margin-bottom:6px;"><span style="color:#888;">Хүний тоо</span><span>${state.qty} хүн</span></div>
            <div style="display:flex;justify-content:space-between;margin-bottom:6px;"><span style="color:#888;">Өдөр</span><span>${state.date}</span></div>
            <div style="display:flex;justify-content:space-between;margin-bottom:6px;"><span style="color:#888;">Цаг</span><span>${state.time}</span></div>
            <div style="display:flex;justify-content:space-between;margin-top:12px;padding-top:12px;border-top:1px solid #e9d5ff;"><span style="font-weight:700;">Нийт үнэ</span><span style="font-weight:700;color:#c27e4a;">${formatPrice(PKG.price * state.qty)}</span></div>
          `;
        }
      });
      
      qtyPlus.addEventListener("click", () => {
        if (state.qty < maxQty) {
          state.qty++;
          qtyValue.textContent = state.qty;
          summaryDiv.innerHTML = `
            <p style="font-weight:700;margin-bottom:12px;">📋 ЗАХИАЛГЫН ДЭЛГЭРЭНГҮЙ</p>
            <div style="display:flex;justify-content:space-between;margin-bottom:6px;"><span style="color:#888;">Багц</span><span>${PKG.name}</span></div>
            <div style="display:flex;justify-content:space-between;margin-bottom:6px;"><span style="color:#888;">Хүний тоо</span><span>${state.qty} хүн</span></div>
            <div style="display:flex;justify-content:space-between;margin-bottom:6px;"><span style="color:#888;">Өдөр</span><span>${state.date}</span></div>
            <div style="display:flex;justify-content:space-between;margin-bottom:6px;"><span style="color:#888;">Цаг</span><span>${state.time}</span></div>
            <div style="display:flex;justify-content:space-between;margin-top:12px;padding-top:12px;border-top:1px solid #e9d5ff;"><span style="font-weight:700;">Нийт үнэ</span><span style="font-weight:700;color:#c27e4a;">${formatPrice(PKG.price * state.qty)}</span></div>
          `;
        }
      });
      
      document.getElementById("backStep")?.addEventListener("click", () => { state.step = 2; render(); });
      document.getElementById("submitBooking")?.addEventListener("click", async () => {
        const name = document.getElementById("nameInput").value.trim();
        const phone = document.getElementById("phoneInput").value.trim();
        const email = document.getElementById("emailInput").value.trim();
        
        if (!name || !phone || !email) {
          alert("Бүх талбарыг бөглөнө үү!");
          return;
        }
        
        if (!/^\d{8}$/.test(phone.replace(/\s/g, ""))) {
          alert("Утасны дугаар 8 оронтой байх ёстой!");
          return;
        }
        
        if (!email.includes("@")) {
          alert("Зөв и-мэйл хаяг оруулна уу!");
          return;
        }
        
        const available = await checkSlotAvailable(state.date, state.time, state.qty);
        if (!available) {
          alert("Сонгосон цаг дүүрсэн байна. Өөр цаг сонгоно уу!");
          return;
        }
        
        const bookingData = {
          id: generateId(),
          name, phone, email,
          date: state.date,
          time: state.time,
          qty: state.qty,
          packageId: PKG.id,
          packageName: PKG.name,
          price: PKG.price * state.qty,
          status: "pending",
          createdAt: new Date().toISOString()
        };
        
        const result = await createBooking(bookingData);
        if (result.success) {
          state.lastBooking = { ...bookingData, firebaseId: result.id };
          state.page = "success";
          state.step = 1;
          state.qty = 1;
          state.form = { name: "", phone: "", email: "" };
          state.time = "";
          loadBookings();
        } else {
          alert("Алдаа гарлаа. Дахин оролдоно уу.");
        }
      });
    }, 0);
  }
  
  // Back to home button
  setTimeout(() => {
    document.getElementById("backHome")?.addEventListener("click", () => { state.page = "home"; render(); });
  }, 0);
  
  return wrapper;
}

function renderSuccess() {
  const b = state.lastBooking;
  if (!b) {
    state.page = "home";
    render();
    return null;
  }
  
  const wrapper = document.createElement("div");
  wrapper.style.cssText = "min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(135deg,#fff5f0,#f5f0ff);";
  wrapper.innerHTML = `
    <div style="max-width:480px;width:100%;background:white;border-radius:28px;padding:44px 36px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.08);">
      <div style="font-size:56px;margin-bottom:14px;">🎉</div>
      <h2 style="font-size:34px;margin-bottom:8px;">Захиалга амжилттай!</h2>
      <p style="color:#888;margin-bottom:28px;">Захиалгын дугаар: <strong style="color:#1a1a1a;">#${b.id}</strong><br>Та ${b.email}-руу баталгаажих и-мэйл хүлээж авна.</p>
      <div style="background:#fdf4ff;border-radius:14px;padding:18px;margin-bottom:20px;text-align:left;">
        ${[
          ["Багц", b.packageName],
          ["Хүний тоо", b.qty + " хүн"],
          ["Өдөр", b.date],
          ["Цаг", b.time],
          ["Нэр", b.name],
          ["Утас", b.phone],
          ["Нийт үнэ", formatPrice(b.price)]
        ].map(row => `<div style="display:flex;justify-content:space-between;margin-bottom:7px;"><span style="color:#888;">${row[0]}</span><span style="font-weight:600;">${row[1]}</span></div>`).join("")}
      </div>
      <div style="background:#fff7ed;border-radius:12px;padding:16px;margin-bottom:26px;text-align:left;">
        <p style="font-weight:700;color:#c2410c;margin-bottom:8px;">💳 Төлбөр шилжүүлэх</p>
        <p><strong>${BANK}</strong> · <strong>${ACCOUNT}</strong><br>Гүйлгээний утга: <strong>${b.phone}</strong><br>Дүн: <strong style="color:#c2410c;">${formatPrice(b.price)}</strong></p>
        <p style="margin-top:8px;color:#aaa;font-size:12px;">Төлбөр орсны дараа админ баталгаажуулна.</p>
      </div>
      <button id="homeBtn" style="width:100%;background:#1a1a1a;color:white;border:none;border-radius:13px;padding:14px 0;font-weight:600;">Нүүр хуудас руу буцах</button>
    </div>
  `;
  
  setTimeout(() => {
    document.getElementById("homeBtn")?.addEventListener("click", () => { state.page = "home"; render(); });
  }, 0);
  
  return wrapper;
}

function renderAdmin() {
  if (!state.adminAuthed) {
    return renderAdminLogin();
  }
  
  const wrapper = document.createElement("div");
  wrapper.style.cssText = "min-height:100vh;background:#f7f7f7;";
  
  // Admin Header
  const header = document.createElement("div");
  header.style.cssText = "background:#1a1a1a;color:white;display:flex;justify-content:space-between;align-items:center;padding:0 24px;height:64px;";
  header.innerHTML = `
    <div style="display:flex;align-items:center;gap:12px;">
      <span style="font-size:20px;">🎂</span>
      <span style="font-weight:600;">Cakely Admin</span>
      <span style="font-size:11px;background:rgba(255,255,255,0.2);padding:2px 8px;border-radius:6px;">${ADMIN_EMAIL}</span>
    </div>
    <div style="display:flex;gap:8px;">
      <button id="tabBookings" style="background:${state.adminTab === "bookings" ? "rgba(255,255,255,0.2)" : "none"};border:none;color:white;padding:8px 16px;border-radius:8px;cursor:pointer;">📋 Захиалгууд</button>
      <button id="tabCalendar" style="background:${state.adminTab === "calendar" ? "rgba(255,255,255,0.2)" : "none"};border:none;color:white;padding:8px 16px;border-radius:8px;cursor:pointer;">📅 Хуваарь</button>
      <button id="logoutBtn" style="background:none;border:1px solid #444;color:#888;padding:6px 12px;border-radius:8px;cursor:pointer;">Гарах</button>
    </div>
  `;
  wrapper.appendChild(header);
  
  const content = document.createElement("div");
  content.style.cssText = "max-width:1200px;margin:0 auto;padding:28px 24px;";
  
  if (state.adminTab === "bookings") {
    // Stats
    const stats = document.createElement("div");
    stats.style.cssText = "display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:16px;margin-bottom:28px;";
    const total = state.bookings.length;
    const pending = state.bookings.filter(b => b.status === "pending").length;
    const confirmed = state.bookings.filter(b => b.status === "confirmed").length;
    const cancelled = state.bookings.filter(b => b.status === "cancelled").length;
    
    stats.innerHTML = `
      <div class="card"><div style="font-size:28px;font-weight:700;">${total}</div><div style="font-size:12px;color:#888;">Нийт</div></div>
      <div class="card"><div style="font-size:28px;font-weight:700;color:#f59e0b;">${pending}</div><div style="font-size:12px;color:#888;">Хүлээгдэж буй</div></div>
      <div class="card"><div style="font-size:28px;font-weight:700;color:#10b981;">${confirmed}</div><div style="font-size:12px;color:#888;">Баталгаажсан</div></div>
      <div class="card"><div style="font-size:28px;font-weight:700;color:#ef4444;">${cancelled}</div><div style="font-size:12px;color:#888;">Цуцлагдсан</div></div>
    `;
    content.appendChild(stats);
    
    // Filters
    const filters = document.createElement("div");
    filters.style.cssText = "display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;";
    ["all", "pending", "confirmed", "cancelled"].forEach(filter => {
      const filterNames = { all: "Бүгд", pending: "Хүлээгдэж буй", confirmed: "Баталгаажсан", cancelled: "Цуцлагдсан" };
      filters.innerHTML += `<button class="filter-btn" data-filter="${filter}" style="background:${state.adminFilter === filter ? "#1a1a1a" : "white"};color:${state.adminFilter === filter ? "white" : "#666"};border:1px solid #e8ddd5;border-radius:8px;padding:8px 20px;cursor:pointer;">${filterNames[filter]}</button>`;
    });
    content.appendChild(filters);
    
    // Table
    const filtered = state.adminFilter === "all" ? state.bookings : state.bookings.filter(b => b.status === state.adminFilter);
    const tableDiv = document.createElement("div");
    tableDiv.className = "card";
    tableDiv.style.overflowX = "auto";
    
    if (filtered.length === 0) {
      tableDiv.innerHTML = '<div style="padding:48px;text-align:center;color:#bbb;">Захиалга байхгүй байна</div>';
    } else {
      let tableHtml = '<table class="admin-table"><thead><tr>';
      tableHtml += '<th>ID</th><th>Нэр</th><th>Утас</th><th>И-мэйл</th><th>Тоо</th><th>Өдөр</th><th>Цаг</th><th>Үнэ</th><th>Төлөв</th><th>Үйлдэл</th>';
      tableHtml += '</tr></thead><tbody>';
      
      filtered.slice().reverse().forEach(b => {
        tableHtml += `<tr>
          <td><span style="font-size:11px;color:#888;">#${b.id.slice(0,8)}</span></td>
          <td><strong>${b.name}</strong></td>
          <td>${b.phone}</td>
          <td style="font-size:12px;">${b.email}</td>
          <td>${b.qty || 1}х</td>
          <td>${b.date}</td>
          <td>${b.time}</td>
          <td style="color:#c27e4a;">${formatPrice(b.price)}</td>
          <td><span class="status-badge status-${b.status}">${SL[b.status]}</span></td>
          <td>
            ${b.status === "pending" ? `<button class="confirm-btn" data-id="${b.id}" style="background:#10b981;color:white;border:none;border-radius:6px;padding:4px 12px;font-size:11px;cursor:pointer;">Баталгаажуулах</button>` : ""}
            ${b.status !== "cancelled" ? `<button class="cancel-btn" data-id="${b.id}" style="background:#ef4444;color:white;border:none;border-radius:6px;padding:4px 12px;font-size:11px;margin-left:6px;cursor:pointer;">Цуцлах</button>` : ""}
          </td>
        </tr>`;
      });
      tableHtml += '</tbody></table>';
      tableDiv.innerHTML = tableHtml;
    }
    content.appendChild(tableDiv);
  }
  
  else if (state.adminTab === "calendar") {
    content.innerHTML = `
      <h2 style="font-size:28px;margin-bottom:8px;">Хуваарь удирдах</h2>
      <p style="color:#888;margin-bottom:36px;">Амралтын өдөр тохируулах ба өдрийн захиалгын байдал харах</p>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:24px;">
        <div class="card">
          <h3 style="margin-bottom:16px;">🛑 Амралтын өдрүүд</h3>
          <div id="holidaysList"></div>
        </div>
        <div class="card">
          <h3 style="margin-bottom:16px;">📊 Өдрийн захиалгын байдал</h3>
          <input type="date" id="schedDatePicker" value="${state.schedDate}" style="margin-bottom:16px;">
          <div id="dailySlots"></div>
        </div>
      </div>
    `;
    
    setTimeout(() => {
      const holidaysList = document.getElementById("holidaysList");
      const schedPicker = document.getElementById("schedDatePicker");
      const dailySlots = document.getElementById("dailySlots");
      
      schedPicker?.addEventListener("change", (e) => {
        state.schedDate = e.target.value;
        updateDailySlots(dailySlots);
      });
      
      function updateDailySlots(container) {
        const date = state.schedDate;
        const slotsHtml = '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;">' + 
          SLOTS.map(slot => {
            const bookings = state.bookings.filter(b => b.date === date && b.time === slot && b.status !== "cancelled");
            const used = bookings.reduce((s, b) => s + (b.qty || 1), 0);
            const left = MAX_SLOT - used;
            return `<div style="border:1px solid #f0e6de;border-radius:12px;padding:12px;">
              <strong>${slot}</strong>
              <div style="font-size:12px;color:${left === 0 ? "#ef4444" : left <= 2 ? "#f59e0b" : "#10b981"};">${used}/${MAX_SLOT}</div>
              ${bookings.map(b => `<div style="font-size:10px;color:#888;">• ${b.name} (${b.qty}х)</div>`).join("")}
            </div>`;
          }).join("") + '</div>';
        container.innerHTML = slotsHtml;
      }
      
      updateDailySlots(dailySlots);
    }, 0);
  }
  
  wrapper.appendChild(content);
  
  setTimeout(() => {
    document.getElementById("tabBookings")?.addEventListener("click", () => { state.adminTab = "bookings"; render(); });
    document.getElementById("tabCalendar")?.addEventListener("click", () => { state.adminTab = "calendar"; render(); });
    document.getElementById("logoutBtn")?.addEventListener("click", () => { adminLogout(); });
    
    document.querySelectorAll(".confirm-btn").forEach(btn => {
      btn.addEventListener("click", async (e) => {
        const id = btn.getAttribute("data-id");
        await updateBookingStatus(id, "confirmed");
        loadBookings();
      });
    });
    
    document.querySelectorAll(".cancel-btn").forEach(btn => {
      btn.addEventListener("click", async (e) => {
        const id = btn.getAttribute("data-id");
        await updateBookingStatus(id, "cancelled");
        loadBookings();
      });
    });
    
    document.querySelectorAll(".filter-btn").forEach(btn => {
      btn.addEventListener("click", (e) => {
        state.adminFilter = btn.getAttribute("data-filter");
        render();
      });
    });
  }, 0);
  
  return wrapper;
}

function renderAdminLogin() {
  const wrapper = document.createElement("div");
  wrapper.style.cssText = "min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a1a1a,#2d1b2e);padding:24px;";
  wrapper.innerHTML = `
    <div class="card" style="max-width:400px;width:100%;padding:48px;text-align:center;">
      <div style="font-size:48px;margin-bottom:12px;">🎂</div>
      <h2 style="margin-bottom:8px;">Cakely Studio</h2>
      <p style="color:#888;margin-bottom:28px;">Админ удирдлагын систем</p>
      <div style="margin-bottom:16px;">
        <input type="email" id="adminEmail" placeholder="И-мэйл хаяг" style="margin-bottom:12px;">
        <input type="password" id="adminPassword" placeholder="Нууц үг">
      </div>
      <button id="adminLoginBtn" class="btn-primary" style="width:100%;">Нэвтрэх</button>
      <button id="backHomeBtn" style="background:none;border:none;color:#c27e4a;margin-top:16px;cursor:pointer;">← Нүүр хуудасруу буцах</button>
      <div id="loginError" style="color:#ef4444;font-size:12px;margin-top:12px;"></div>
    </div>
  `;
  
  setTimeout(() => {
    document.getElementById("adminLoginBtn")?.addEventListener("click", async () => {
      const email = document.getElementById("adminEmail").value;
      const password = document.getElementById("adminPassword").value;
      const success = await adminLogin(email, password);
      if (!success) {
        document.getElementById("loginError").textContent = "И-мэйл эсвэл нууц үг буруу байна";
      }
    });
    document.getElementById("backHomeBtn")?.addEventListener("click", () => { state.page = "home"; render(); });
  }, 0);
  
  return wrapper;
}

// Initialize
loadBookings();
</script>
</body>
</html>
