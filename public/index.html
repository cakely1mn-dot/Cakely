<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Cakely Studio 🎀</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: system-ui, -apple-system, 'Segoe UI', 'Quicksand', Roboto, Helvetica, sans-serif;
  background: linear-gradient(145deg, #fff0f5 0%, #ffe8f0 100%);
  min-height: 100vh;
  padding: 16px;
}

.app-container {
  max-width: 550px;
  margin: 0 auto;
  background: white;
  border-radius: 48px;
  box-shadow: 0 20px 40px rgba(255, 105, 180, 0.15);
  overflow: hidden;
  min-height: 90vh;
}

.content {
  padding: 28px 24px 40px;
}

/* хөөрхөн ягаан товч */
.btn-primary {
  background: linear-gradient(135deg, #ff9acb, #ff80b5);
  color: white;
  border: none;
  padding: 14px 24px;
  border-radius: 60px;
  font-size: 16px;
  font-weight: 600;
  width: 100%;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 4px 12px rgba(255, 128, 181, 0.3);
}

.btn-primary:active {
  transform: scale(0.97);
}

.btn-outline {
  background: transparent;
  border: 2px solid #ff9acb;
  color: #ff80b5;
  padding: 10px 20px;
  border-radius: 60px;
  font-weight: 600;
  cursor: pointer;
}

/* карт */
.card {
  background: #fffafc;
  border-radius: 32px;
  padding: 24px;
  margin-bottom: 20px;
  border: 1px solid #ffe0ed;
  box-shadow: 0 4px 14px rgba(0, 0, 0, 0.02);
}

/* цагийн слотууд */
.time-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin: 20px 0;
}

.time-slot {
  background: #fff5f9;
  border: 2px solid #ffe0ed;
  border-radius: 60px;
  padding: 12px 8px;
  text-align: center;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  color: #b85c8a;
}

.time-slot.selected {
  background: linear-gradient(135deg, #ff9acb, #ff80b5);
  border-color: #ff80b5;
  color: white;
}

.time-slot.disabled {
  opacity: 0.4;
  cursor: not-allowed;
  text-decoration: line-through;
  background: #f0e0e8;
}

.slot-info {
  font-size: 10px;
  margin-top: 4px;
  font-weight: 400;
}

/* input */
.input-field {
  width: 100%;
  padding: 14px 18px;
  border: 2px solid #ffe0ed;
  border-radius: 60px;
  font-size: 15px;
  font-family: inherit;
  background: #fffafc;
  margin-bottom: 16px;
}

.input-field:focus {
  outline: none;
  border-color: #ff9acb;
  box-shadow: 0 0 0 3px rgba(255, 154, 203, 0.1);
}

/* хэмжээ сонгогч */
.qty-box {
  background: #fff5f9;
  border-radius: 60px;
  padding: 12px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.qty-btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: white;
  border: 2px solid #ffe0ed;
  font-size: 24px;
  font-weight: bold;
  cursor: pointer;
  color: #ff80b5;
}

/* степер */
.stepper {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 32px;
  background: #fff5f9;
  padding: 12px 20px;
  border-radius: 80px;
}

.step {
  text-align: center;
  flex: 1;
}

.step-circle {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: #ffe0ed;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  color: #b85c8a;
  margin-bottom: 4px;
}

.step-circle.active {
  background: linear-gradient(135deg, #ff9acb, #ff80b5);
  color: white;
}

.step-circle.completed {
  background: #ffb6d9;
  color: white;
}

.step-label {
  font-size: 11px;
  font-weight: 600;
  color: #b87a9c;
}

.step-label.active {
  color: #ff80b5;
}

/* админ хүснэгт */
.admin-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

.admin-table th, .admin-table td {
  padding: 10px 8px;
  text-align: left;
  border-bottom: 1px solid #ffe0ed;
}

.status-badge {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 40px;
  font-size: 11px;
  font-weight: 600;
}

.status-pending { background: #fff0e0; color: #ff9a3c; }
.status-confirmed { background: #e6f9ed; color: #2ecc71; }
.status-cancelled { background: #ffe6e6; color: #e74c3c; }

.nav-bar {
  background: white;
  padding: 14px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid #ffe0ed;
}
</style>
</head>
<body>
<div id="app"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getFirestore, collection, addDoc, getDocs, query, where, updateDoc, doc 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { 
  getAuth, signInWithEmailAndPassword, signOut 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyDVXshgnrA-Q8C8Nm-CPdZ4LWsSGVOSgAs",
  authDomain: "cakely-30e38.firebaseapp.com",
  projectId: "cakely-30e38",
  storageBucket: "cakely-30e38.firebasestorage.app",
  messagingSenderId: "205358268388",
  appId: "1:205358268388:web:d43f871258c592894891f1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// ── CONFIG ──
const PHONE = "90301779";
const ADDRESS = "11-р хороолол, Diamond Entertainment Lounge-ын хойд хаалга";
const ACCOUNT = "290005005070318300";
const ADMIN_EMAIL = "cakely1.mn@gmail.com";
const ADMIN_PASS = "Cakely@2026";
const SLOTS = ["10:00", "12:00", "14:00", "16:00", "18:00", "20:00"];
const MAX_SLOT = 6;

const PKG = {
  name: "🎀 Нэг хүний багц",
  price: 45000,
  emoji: "✨",
  items: ["Бялууны кекс 1 ширхэг", "Крем + чимэглэл", "Уух зүйл 1 ширхэг", "Заавар зөвлөгөө"]
};

function fmt(n) { return (n || 0).toLocaleString() + "₮"; }
function today() { return new Date().toISOString().slice(0, 10); }
function uid() { return Date.now().toString(36).toUpperCase() + Math.random().toString(36).slice(2, 6).toUpperCase(); }

// ── STATE ──
let S = {
  page: "home",
  bookings: [],
  lastBook: null,
  step: 1,
  date: today(),
  time: "",
  qty: 1,
  form: { name: "", phone: "", email: "" },
  errors: {},
  adminAuthed: localStorage.getItem("ck:auth") === "1",
  adminTab: "bookings",
  adminFilter: "all"
};

function setState(patch) { Object.assign(S, patch); render(); }

// ── FIRESTORE FUNCTIONS ──
async function loadBookings() {
  try {
    const snap = await getDocs(collection(db, "bookings"));
    const list = [];
    snap.forEach(d => list.push({ id: d.id, ...d.data() }));
    S.bookings = list;
    render();
  } catch (e) { console.error(e); }
}

async function slotAvailable(date, time, qty) {
  const q = query(collection(db, "bookings"), where("date", "==", date), where("time", "==", time));
  const snap = await getDocs(q);
  let used = 0;
  snap.forEach(d => { if (d.data().status !== "cancelled") used += (d.data().qty || 1); });
  return (used + qty) <= MAX_SLOT;
}

async function getSlotUsage(date, time) {
  const q = query(collection(db, "bookings"), where("date", "==", date), where("time", "==", time));
  const snap = await getDocs(q);
  let used = 0;
  snap.forEach(d => { if (d.data().status !== "cancelled") used += (d.data().qty || 1); });
  return used;
}

async function createBooking(data) {
  try {
    await addDoc(collection(db, "bookings"), { ...data, createdAt: new Date().toISOString(), status: "pending" });
    return true;
  } catch (e) { return false; }
}

async function updateStatus(id, status) {
  try { await updateDoc(doc(db, "bookings", id), { status }); return true; } 
  catch (e) { return false; }
}

async function adminLogin(email, pass) {
  try { await signInWithEmailAndPassword(auth, email, pass); S.adminAuthed = true; localStorage.setItem("ck:auth", "1"); render(); return true; } 
  catch (e) { return false; }
}

function adminLogout() { signOut(auth); S.adminAuthed = false; localStorage.removeItem("ck:auth"); S.page = "home"; render(); }

// ── RENDER ──
function render() {
  const appDiv = document.getElementById("app");
  appDiv.innerHTML = `<div class="app-container"><div class="content"></div></div>`;
  const content = appDiv.querySelector(".content");
  
  if (S.page === "home") renderHome(content);
  else if (S.page === "book") renderBook(content);
  else if (S.page === "success") renderSuccess(content);
  else if (S.page === "admin") renderAdmin(content);
}

function renderHome(container) {
  container.innerHTML = `
    <div style="text-align: center; margin-bottom: 32px;">
      <div style="font-size: 56px;">🍰✨</div>
      <h1 style="font-size: 32px; font-weight: 700; background: linear-gradient(135deg, #ff80b5, #ff9acb); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Cakely Studio</h1>
      <p style="color: #b85c8a;">Гар хийцийн бялууны студио</p>
    </div>
    
    <div class="card" style="text-align: center;">
      <div style="font-size: 48px;">${PKG.emoji}</div>
      <h2 style="font-size: 24px; margin: 12px 0;">${PKG.name}</h2>
      <p style="font-size: 28px; font-weight: 700; color: #ff80b5;">${fmt(PKG.price)} / хүн</p>
      <ul style="list-style: none; margin: 20px 0; text-align: left;">
        ${PKG.items.map(i => `<li style="margin: 8px 0;">🌸 ${i}</li>`).join("")}
      </ul>
      <button class="btn-primary" id="bookBtn">📅 Захиалах</button>
    </div>
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px;">
      <div class="card" style="text-align: center; padding: 16px;"><span style="font-size: 28px;">📍</span><p style="font-size: 12px;">${ADDRESS.split(",")[0]}</p></div>
      <div class="card" style="text-align: center; padding: 16px;"><span style="font-size: 28px;">📞</span><p style="font-size: 12px;">${PHONE}</p></div>
    </div>
    
    <button id="adminBtn" style="background: none; border: 1px solid #ffd0e4; border-radius: 60px; padding: 10px; width: 100%; margin-top: 20px; color: #ff80b5;">🔐 Админ</button>
  `;
  document.getElementById("bookBtn")?.onclick = () => setState({ page: "book", step: 1, time: "", qty: 1 });
  document.getElementById("adminBtn")?.onclick = () => setState({ page: "admin" });
}

function renderBook(container) {
  container.innerHTML = `
    <button id="backHome" style="background: none; border: none; font-size: 28px; margin-bottom: 16px; color: #ff80b5;">←</button>
    <div class="stepper">
      ${[1, 2, 3].map(i => `
        <div class="step">
          <div class="step-circle ${S.step === i ? 'active' : S.step > i ? 'completed' : ''}">${S.step > i ? '✓' : i}</div>
          <div class="step-label ${S.step === i ? 'active' : ''}">${i === 1 ? 'Багц' : i === 2 ? 'Цаг' : 'Мэдээлэл'}</div>
        </div>
      `).join("")}
    </div>
  `;
  
  if (S.step === 1) {
    container.innerHTML += `
      <div class="card" id="selectPkg" style="cursor: pointer;">
        <div style="display: flex; align-items: center; gap: 16px;">
          <span style="font-size: 48px;">${PKG.emoji}</span>
          <div><h3>${PKG.name}</h3><p style="color: #ff80b5;">${fmt(PKG.price)} / хүн</p></div>
          <span style="margin-left: auto;">→</span>
        </div>
      </div>
    `;
    document.getElementById("selectPkg")?.onclick = () => setState({ step: 2 });
  }
  else if (S.step === 2) {
    container.innerHTML += `
      <div class="card">
        <label style="font-weight: 600;">📅 Өдөр сонгох</label>
        <input type="date" id="datePick" value="${S.date}" min="${today()}" class="input-field" style="margin-top: 8px;">
        <label style="font-weight: 600; display: block; margin-top: 20px;">⏰ Цаг сонгох</label>
        <div id="timeSlots" class="time-grid"></div>
        <button id="nextBtn" class="btn-primary" disabled>Үргэлжлүүлэх →</button>
      </div>
    `;
    
    async function updateSlots() {
      const date = document.getElementById("datePick").value;
      const slotsDiv = document.getElementById("timeSlots");
      slotsDiv.innerHTML = "";
      for (const slot of SLOTS) {
        const used = await getSlotUsage(date, slot);
        const left = MAX_SLOT - used;
        const available = left > 0;
        const slotDiv = document.createElement("div");
        slotDiv.className = `time-slot ${S.time === slot ? 'selected' : ''} ${!available ? 'disabled' : ''}`;
        slotDiv.innerHTML = `${slot}<div class="slot-info">${available ? `✨ ${left} суудал үлдсэн` : '❌ дүүрсэн'}</div>`;
        if (available) slotDiv.onclick = () => { S.time = slot; updateSlots(); document.getElementById("nextBtn").disabled = false; };
        slotsDiv.appendChild(slotDiv);
      }
    }
    
    document.getElementById("datePick").onchange = (e) => { S.date = e.target.value; S.time = ""; updateSlots(); };
    updateSlots();
    document.getElementById("nextBtn").onclick = () => { if (S.time) setState({ step: 3 }); };
  }
  else if (S.step === 3) {
    container.innerHTML += `
      <div class="card">
        <div class="qty-box">
          <span>👥 Хүний тоо</span>
          <div style="display: flex; gap: 12px;">
            <button id="qtyMinus" class="qty-btn">-</button>
            <span id="qtyVal" style="font-size: 20px; font-weight: 700; min-width: 40px; text-align: center;">${S.qty}</span>
            <button id="qtyPlus" class="qty-btn">+</button>
          </div>
        </div>
        <input type="text" id="nameInp" placeholder="🌸 Нэр" class="input-field" value="${S.form.name}">
        <input type="tel" id="phoneInp" placeholder="📞 Утас (8 орон)" class="input-field" value="${S.form.phone}">
        <input type="email" id="emailInp" placeholder="✉️ И-мэйл" class="input-field" value="${S.form.email}">
        
        <div style="background: #fff5f9; border-radius: 24px; padding: 16px; margin-bottom: 20px;">
          <p style="font-weight: 700;">📋 Захиалгын мэдээлэл</p>
          <div style="display: flex; justify-content: space-between; margin-top: 8px;"><span>${PKG.name}</span><span>${fmt(PKG.price * S.qty)}</span></div>
          <div style="display: flex; justify-content: space-between;"><span>Хүний тоо:</span><span>${S.qty} хүн</span></div>
          <div style="display: flex; justify-content: space-between;"><span>Өдөр:</span><span>${S.date}</span></div>
          <div style="display: flex; justify-content: space-between;"><span>Цаг:</span><span>${S.time}</span></div>
        </div>
        
        <button id="submitBtn" class="btn-primary">✨ Захиалга илгээх ✨</button>
      </div>
    `;
    
    document.getElementById("qtyMinus").onclick = async () => { 
      if (S.qty > 1) { S.qty--; document.getElementById("qtyVal").innerText = S.qty; updateSummary(); } 
    };
    document.getElementById("qtyPlus").onclick = async () => { 
      const used = await getSlotUsage(S.date, S.time);
      const max = MAX_SLOT - used;
      if (S.qty < max) { S.qty++; document.getElementById("qtyVal").innerText = S.qty; updateSummary(); }
    };
    
    function updateSummary() {
      const summaryDiv = document.querySelector(".card div[style*='background: #fff5f9']");
      if (summaryDiv) {
        summaryDiv.innerHTML = `
          <p style="font-weight: 700;">📋 Захиалгын мэдээлэл</p>
          <div style="display: flex; justify-content: space-between; margin-top: 8px;"><span>${PKG.name}</span><span>${fmt(PKG.price * S.qty)}</span></div>
          <div style="display: flex; justify-content: space-between;"><span>Хүний тоо:</span><span>${S.qty} хүн</span></div>
          <div style="display: flex; justify-content: space-between;"><span>Өдөр:</span><span>${S.date}</span></div>
          <div style="display: flex; justify-content: space-between;"><span>Цаг:</span><span>${S.time}</span></div>
        `;
      }
    }
    
    document.getElementById("submitBtn").onclick = async () => {
      const name = document.getElementById("nameInp").value.trim();
      const phone = document.getElementById("phoneInp").value.trim();
      const email = document.getElementById("emailInp").value.trim();
      
      if (!name || !phone || !email) { alert("Бүх талбарыг бөглөнө үү 💕"); return; }
      if (!/^\d{8}$/.test(phone)) { alert("Утасны дугаар 8 оронтой байх ёстой"); return; }
      if (!email.includes("@")) { alert("Зөв и-мэйл хаяг оруулна уу"); return; }
      
      const available = await slotAvailable(S.date, S.time, S.qty);
      if (!available) { alert("Сонгосон цаг дүүрсэн байна 😢"); return; }
      
      const booking = {
        id: uid(), name, phone, email, date: S.date, time: S.time, qty: S.qty,
        packageName: PKG.name, price: PKG.price * S.qty
      };
      
      const success = await createBooking(booking);
      if (success) {
        S.lastBook = booking;
        S.page = "success";
        S.step = 1;
        S.qty = 1;
        S.form = { name: "", phone: "", email: "" };
        S.time = "";
        loadBookings();
      } else { alert("Алдаа гарлаа. Дахин оролдоно уу"); }
    };
  }
  
  document.getElementById("backHome")?.onclick = () => setState({ page: "home" });
}

function renderSuccess(container) {
  const b = S.lastBook;
  if (!b) { setState({ page: "home" }); return; }
  container.innerHTML = `
    <div style="text-align: center; padding: 20px;">
      <div style="font-size: 64px;">🎉✨🍰</div>
      <h2 style="font-size: 28px; margin: 16px 0;">Захиалга амжилттай!</h2>
      <p style="color: #b85c8a;">Захиалгын дугаар: #${b.id.slice(0,8)}</p>
      <div class="card" style="text-align: left; margin: 20px 0;">
        <p><strong>📦 ${b.packageName}</strong></p>
        <p>👥 ${b.qty} хүн &nbsp; 📅 ${b.date} &nbsp; ⏰ ${b.time}</p>
        <p>💰 ${fmt(b.price)}</p>
      </div>
      <div class="card" style="background: #fff5f9;">
        <p>💳 ${BANK} · ${ACCOUNT}</p>
        <p>Гүйлгээний утга: <strong>${b.phone}</strong></p>
      </div>
      <button class="btn-primary" id="homeBtn">🏠 Нүүр хуудас</button>
    </div>
  `;
  document.getElementById("homeBtn")?.onclick = () => setState({ page: "home" });
}

function renderAdmin(container) {
  // Админ нэвтрэх хэсэг
  if (!S.adminAuthed) {
    container.innerHTML = `
      <div style="text-align: center; padding: 20px;">
        <div class="card">
          <div style="font-size: 48px;">🔐✨</div>
          <h2 style="margin: 16px 0;">Админ нэвтрэх</h2>
          <input type="email" id="adminEmail" placeholder="И-мэйл" class="input-field">
          <input type="password" id="adminPass" placeholder="Нууц үг" class="input-field">
          <button id="loginBtn" class="btn-primary">Нэвтрэх</button>
          <button id="backHomeAdmin" style="background: none; border: none; color: #ff80b5; margin-top: 16px;">← Нүүр рүү</button>
          <div id="loginErr" style="color: #e74c3c; margin-top: 12px;"></div>
        </div>
      </div>
    `;
    document.getElementById("loginBtn")?.addEventListener("click", async () => {
      const email = document.getElementById("adminEmail").value;
      const pass = document.getElementById("adminPass").value;
      const ok = await adminLogin(email, pass);
      if (!ok) document.getElementById("loginErr").innerText = "❌ И-мэйл эсвэл нууц үг буруу";
    });
    document.getElementById("backHomeAdmin")?.onclick = () => setState({ page: "home" });
    return;
  }
  
  // Админ панель (white screen зассан)
  const pendingCount = S.bookings.filter(b => b.status === "pending").length;
  const confirmedCount = S.bookings.filter(b => b.status === "confirmed").length;
  
  container.innerHTML = `
    <div style="margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;">
      <div><span style="font-size: 28px;">🍰</span><span style="font-weight: 700;"> Cakely Admin</span></div>
      <button id="logoutAdmin" style="background: #ffe0ed; border: none; padding: 8px 16px; border-radius: 40px;">Гарах</button>
    </div>
    
    <div style="display: flex; gap: 12px; margin-bottom: 20px;">
      <button id="tabBookings" class="${S.adminTab === 'bookings' ? 'btn-primary' : 'btn-outline'}" style="flex: 1;">📋 Захиалгууд</button>
      <button id="tabCalendar" class="${S.adminTab === 'calendar' ? 'btn-primary' : 'btn-outline'}" style="flex: 1;">📅 Хуваарь</button>
    </div>
    
    <div id="adminContent"></div>
  `;
  
  const adminContent = container.querySelector("#adminContent");
  
  if (S.adminTab === "bookings") {
    adminContent.innerHTML = `
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px;">
        <div class="card" style="text-align: center;"><div style="font-size: 32px; font-weight: 700; color: #ff9a3c;">${pendingCount}</div><div>Хүлээгдэж буй</div></div>
        <div class="card" style="text-align: center;"><div style="font-size: 32px; font-weight: 700; color: #2ecc71;">${confirmedCount}</div><div>Баталгаажсан</div></div>
      </div>
      <div style="display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;">
        ${["all","pending","confirmed","cancelled"].map(f => `<button class="filterBtn" data-filter="${f}" style="background:${S.adminFilter===f?'#ff9acb':'white'};border:1px solid #ffe0ed;border-radius:40px;padding:6px 16px;">${f==='all'?'Бүгд':f==='pending'?'Хүлээгэж буй':f==='confirmed'?'Баталгаажсан':'Цуцлагдсан'}</button>`).join("")}
      </div>
      <div class="card" style="overflow-x: auto;">
        <table class="admin-table">
          <thead><tr><th>Нэр</th><th>Огноо/Цаг</th><th>Тоо</th><th>Үнэ</th><th>Төлөв</th><th></th></tr></thead>
          <tbody id="bookingsList"></tbody>
        </table>
      </div>
    `;
    
    const filtered = S.adminFilter === "all" ? S.bookings : S.bookings.filter(b => b.status === S.adminFilter);
    const tbody = adminContent.querySelector("#bookingsList");
    tbody.innerHTML = filtered.slice().reverse().map(b => `
      <tr>
        <td><strong>${b.name}</strong><br><span style="font-size: 10px;">${b.email}</span></td>
        <td>${b.date}<br>${b.time}</td>
        <td>${b.qty || 1} х</td>
        <td>${fmt(b.price)}</td>
        <td><span class="status-badge status-${b.status}">${b.status === 'pending' ? 'Хүлээгэж буй' : b.status === 'confirmed' ? 'Баталгаажсан' : 'Цуцлагдсан'}</span></td>
        <td>${b.status === 'pending' ? `<button class="confirmBtn" data-id="${b.id}" style="background:#ff9acb;border:none;border-radius:40px;padding:6px 12px;color:white;">✓</button>` : ''}</td>
      </tr>
    `).join("");
    
    document.querySelectorAll(".confirmBtn").forEach(btn => {
      btn.onclick = async () => { await updateStatus(btn.dataset.id, "confirmed"); loadBookings(); };
    });
    document.querySelectorAll(".filterBtn").forEach(btn => {
      btn.onclick = () => { S.adminFilter = btn.dataset.filter; render(); };
    });
  }
  else if (S.adminTab === "calendar") {
    adminContent.innerHTML = `
      <div class="card">
        <label>📅 Өдөр сонгох</label>
        <input type="date" id="calDate" value="${S.date}" class="input-field" style="margin-top: 8px;">
        <div id="dailySlots" class="time-grid" style="margin-top: 16px;"></div>
      </div>
    `;
    
    async function updateDaily() {
      const date = document.getElementById("calDate").value;
      const slotsDiv = document.getElementById("dailySlots");
      slotsDiv.innerHTML = "";
      for (const slot of SLOTS) {
        const used = await getSlotUsage(date, slot);
        const left = MAX_SLOT - used;
        slotsDiv.innerHTML += `
          <div style="background: #fff5f9; border-radius: 20px; padding: 12px; text-align: center;">
            <strong>${slot}</strong><br>
            ${used}/${MAX_SLOT}<br>
            <span style="font-size: 11px; color: ${left > 0 ? '#ff80b5' : '#e74c3c'}">${left > 0 ? `✨ ${left} суудал үлдсэн` : '❌ дүүрсэн'}</span>
          </div>
        `;
      }
    }
    document.getElementById("calDate").onchange = updateDaily;
    updateDaily();
  }
  
  document.getElementById("tabBookings")?.onclick = () => { S.adminTab = "bookings"; render(); };
  document.getElementById("tabCalendar")?.onclick = () => { S.adminTab = "calendar"; render(); };
  document.getElementById("logoutAdmin")?.onclick = () => adminLogout();
}

// Start
loadBookings();
</script>
</body>
</html>
